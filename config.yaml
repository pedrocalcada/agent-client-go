AWS_REGION: "us-east-1"
AWS_ENDPOINT: ""
SQS_INPUT_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/339713071347/teste"
SQS_OUTPUT_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/339713071347/teste-saida"
SQS_MAX_MESSAGES: 5
SQS_WAIT_SECONDS: 2
WORKER_COUNT: 1
LLM_API_URL: "http://localhost:11434/api/chat"
LLM_MODEL: "deepseek-r1"

# URLs base dos agentes A2A (AgentCard em /.well-known/agent-card.json).
# O orquestrador usa o protocolo A2A para falar com cada agente.
agent_urls:
  agente-investimento: "http://localhost:9001"
  agente-pagamentos: "http://localhost:9002"
  agente-cartoes: "http://localhost:9003"
#   agente-geral: "http://localhost:9003"

# Endpoint para o agente devolver a resposta (request/reply). Se definido, o orquestrador sobe um HTTP server e informa essa URL ao agente nos metadados (callback_url).
ORCHESTRATOR_CALLBACK_LISTEN: ":8080"
ORCHESTRATOR_CALLBACK_BASE_URL: "http://localhost:8080/a2a/callback"
